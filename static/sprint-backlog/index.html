<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
  <title>Product Backlog</title>
</head>
<body>

  <header class="header">
    <a href="/" class="logo">Stories</a>

    <div class="nav-right" id="authArea"></div>
  </header>

  <div class="container" style="margin-top: 60px;">
    <h2 class="title">Sprint Backlog</h2>

    <div style="display:flex; justify-content:center; gap:20px; margin-top:25px;">
      <a href="/product-backlog" class="btn">Switch to Product Backlog</a>
    </div>
  </div>

  <div class="sort-container">
    <button id="sortBtn" class="btn">Sort By</button>
  </div>

  <div id="storyList" style="width:100%; margin-bottom:80px;"></div>

  <div id="createModal" class="modal hidden">
    <div class="modal-content story-modal">
      <h3>Create User Story</h3>

      <div class="modal-field">
        <label>Priority (1-10)</label>
        <input type="number" id="priorityInput" min="1" max="10" />
      </div>

      <div class="modal-field">
        <label>Estimate (hours)</label>
        <input type="number" id="estimateInput" min="1" />
      </div>

      <div class="modal-field">
        <label>Assignment</label>
        <input type="text" id="assignmentInput" />
      </div>

      <div class="modal-field">
        <label>Description</label>
        <textarea id="descriptionInput"></textarea>
      </div>

      <div class="modal-field">
        <label>Spike</label>
        <select id="spikeInput">
          <option>No</option>
          <option>Yes</option>
        </select>
      </div>

      <div class="modal-field">
        <label>Status</label>
        <select id="statusInput">
          <option>Not Ready</option>
          <option>Ready</option>
        </select>
      </div>

      <div class="modal-buttons">
        <button id="saveStoryBtn" class="btn">Save Story</button>
        <button id="closeModalBtn" class="btn cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="modal hidden">
    <div class="modal-content delete-modal">
      <h3>Delete User Story</h3>
      <p>Are you sure you want to delete this story? This action cannot be undone.</p>

      <div class="modal-buttons">
        <button id="confirmDeleteBtn" class="btn" style="background:#d9534f;">Delete</button>
        <button id="cancelDeleteBtn" class="btn cancel-btn">Cancel</button>
      </div>
    </div>
  </div>


<script type="module" src="../js/sprint-backlog.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script src="../js/firebase.js"></script>
<script src="../js/auth-state.js"></script>

</body>
</html>
