<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles.css" />
  <title>Create a Story</title>
</head>
<body>
  <header class="header">
    <h1 class="logo">Stories</h1>

    <label class="theme-switch">
    <input type="checkbox" id="themeToggle" checked />
      <span class="slider">
        <span class="icon moon">🌙</span>
        <span class="icon sun">☀️</span>
      </span>
    </label>
  </header>

  <div class="selection-box">
    <h3>Create a Story</h3>

    <label>Story ID:</label>
    <input type="number" id="id">

    <label>Priority:</label>
    <input type="number" id="priority">

    <label>Estimate:</label>
    <input type="number" id="estimate">

    <label>Assignment:</label>
    <input type="text" id="assigned">

    <label>Description:</label>
    <input type="text" id="description">

    <label>Spike:</label>
    <select id="spike">
      <option value="1">Yes</option>
      <option value="2">No</option>
    </select>

    <label>Status:</label>
    <select id="status">
      <option value="1">Not Ready</option>
      <option value="2">Ready</option>
      <option value="3">Done</option>
    </select>

    <!-- Add a script to add this to the user's sprint database -->
    <button>Create Story</button> 

  </div>

</body>
<script>
  const toggle = document.getElementById('themeToggle');
  const html = document.documentElement;

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      html.setAttribute('data-theme', 'dark');
    } else {
      html.setAttribute('data-theme', 'light');
    }
  });
</script>
